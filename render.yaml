services:
  - type: web
    name: jobmasters-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: jobmasters-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ""  # Leave blank — RENDER_EXTERNAL_HOSTNAME is set automatically
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: jobmasters-backend
          property: host
      - key: GEMINI_API_KEY
        sync: false  # Set this manually in the Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set to your frontend URL in the Render dashboard

databases:
  - name: jobmasters-db
    databaseName: jobmasters
    user: jobmasters
    plan: free
